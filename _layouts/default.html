<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <style>
        /* Genel Site Ayarları */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }

        /* Her zaman en üstte duran Menü Butonu */
        .toggle-btn {
            position: fixed; /* Sayfa kaydırılsa bile ekranda sabit kalır */
            top: 15px;
            left: 20px;
            background-color: #333333;
            color: #ffffff;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 5px;
            z-index: 1001; /* Menüden (1000) daha yüksek bir değer, böylece asla altında kalmaz */
            transition: background-color 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .toggle-btn:hover {
            background-color: #4daafc;
        }

        /* Sol Bar (Artık tüm cihazlarda yazının üstüne çıkacak) */
        .sidebar {
            position: fixed; /* Sayfayı ittirmez, üst katmanda durur */
            top: 0;
            left: -280px; /* Başlangıçta ekranın solunda tamamen saklı */
            width: 260px;
            height: 100vh;
            background-color: #252526;
            box-shadow: 4px 0 15px rgba(0,0,0,0.6);
            transition: left 0.3s ease; /* Kayma animasyonu */
            z-index: 1000;
            overflow-y: auto;
            padding-top: 70px; /* İçerik butonun altında kalmasın diye üstten boşluk */
        }

        .sidebar.open {
            left: 0; /* Butona basılınca ekrana girer */
        }

        .sidebar-content {
            padding: 0 20px 30px 20px;
        }

        /* Ana İçerik Alanı */
        .main-area {
            padding: 60px 8% 40px 8%; /* En üstte menü butonu için boşluk bırakıyoruz */
            line-height: 1.6;
            font-size: 1.1em;
            max-width: 1000px;
            margin: 0 auto; /* İçeriği ortalar */
        }

        /* Link ve Başlık Tasarımları */
        .home-btn { font-size: 1.8em; font-weight: bold; color: #ffffff; text-decoration: none; margin-bottom: 40px; border-bottom: 2px solid #4daafc; padding-bottom: 10px; display: block; }
        .home-btn:hover { color: #4daafc; }
        .sidebar h3 { color: #aaaaaa; font-size: 1em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .sidebar a.log-link { color: #4daafc; text-decoration: none; display: block; margin-bottom: 12px; font-size: 1.05em; }
        .sidebar a.log-link:hover { color: #9cdcfe; text-decoration: underline; }
        .main-area h1, .main-area h2 { color: #ffffff; }
        .main-area img { max-width: 100%; border-radius: 8px; margin-top: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }

    </style>
</head>
<body>

    <button class="toggle-btn" onclick="toggleSidebar()">☰</button>

    <div class="sidebar" id="mySidebar">
        <div class="sidebar-content">
            <a href="/" class="home-btn">🏠 DevLog</a>
            <h3>Latest Updates</h3>
            {% for post in site.posts %}
                <a href="{{ post.url }}" class="log-link">➔ {{ post.title }}</a>
            {% endfor %}
        </div>
    </div>

    <div class="main-area">
        {{ content }}
    </div>

    <script>
        function toggleSidebar() {
            var sidebar = document.getElementById("mySidebar");
            // Ekran boyutu fark etmeksizin menüyü açıp kapatır
            sidebar.classList.toggle("open");
        }
    </script>

</body>
</html>
