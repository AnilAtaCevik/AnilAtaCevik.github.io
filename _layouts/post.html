---
layout: default
---

<div class="post-container">
    <h1 style="color: #4daafc; margin-bottom: 5px; font-size: 2.2em;">{{ page.title }}</h1>
    
    <p style="color: #888888; font-size: 0.9em; border-bottom: 1px solid #444; padding-bottom: 15px; margin-top: 0;">
        📅 {{ page.date | date: "%d.%m.%Y" }}
    </p>

    <div class="post-content">
        {{ content }}
    </div>
</div>
